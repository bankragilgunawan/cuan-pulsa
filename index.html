<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CuanPulsa AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0e1a;
            --bg-secondary: #111827;
            --card-bg: rgba(17, 24, 39, 0.7);
            --accent-green: #00d9a5;
            --accent-green-glow: rgba(0, 217, 165, 0.3);
            --accent-blue: #3b82f6;
            --accent-purple: #8b5cf6;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.08);
            --border-highlight: rgba(0, 217, 165, 0.3);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.4;
            animation: float 20s ease-in-out infinite;
        }

        .bg-blob:nth-child(1) {
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-green) 0%, transparent 70%);
            top: -200px;
            right: -200px;
            animation-delay: 0s;
        }

        .bg-blob:nth-child(2) {
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, var(--accent-blue) 0%, transparent 70%);
            bottom: -150px;
            left: -150px;
            animation-delay: -7s;
        }

        .bg-blob:nth-child(3) {
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--accent-purple) 0%, transparent 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -14s;
            opacity: 0.2;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, -30px) scale(1.05); }
            50% { transform: translate(-20px, 20px) scale(0.95); }
            75% { transform: translate(-30px, -20px) scale(1.02); }
        }

        /* Grid Pattern Overlay */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 1;
        }

        .chat-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 540px;
            margin: 0 auto;
            padding: 24px 16px 160px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Header Badge */
        .header-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, rgba(0, 217, 165, 0.1), rgba(59, 130, 246, 0.1));
            border: 1px solid var(--border-highlight);
            padding: 10px 20px;
            border-radius: 100px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin: 0 auto;
            backdrop-filter: blur(20px);
            transition: all 0.3s ease;
        }

        .header-badge:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 30px var(--accent-green-glow);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
            box-shadow: 0 0 10px var(--accent-green);
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        /* Logo */
        .logo-cp {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 14px;
            color: var(--bg-primary);
            box-shadow: 0 8px 30px var(--accent-green-glow);
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        .logo-cp::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255,255,255,0.3) 50%,
                transparent 60%
            );
            animation: logo-shine 3s ease-in-out infinite;
        }

        @keyframes logo-shine {
            0%, 100% { transform: translateX(-100%) rotate(45deg); }
            50% { transform: translateX(100%) rotate(45deg); }
        }

        /* Message Wrapper */
        .msg-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 14px;
            opacity: 0;
            transform: translateY(30px);
            animation: slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideIn {
            to { opacity: 1; transform: translateY(0); }
        }

        .bubble {
            max-width: 88%;
            padding: 20px 24px;
            border-radius: 24px;
            border-bottom-left-radius: 8px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            font-size: 15px;
            line-height: 1.7;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .bubble::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        /* Menu Grid */
        .menu-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .menu-grid.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .menu-btn {
            background: linear-gradient(135deg, rgba(0, 217, 165, 0.08), rgba(59, 130, 246, 0.08));
            color: var(--text-primary);
            border: 1px solid var(--border-highlight);
            padding: 18px 24px;
            border-radius: 18px;
            cursor: pointer;
            font-weight: 600;
            font-size: 15px;
            text-align: left;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .menu-btn .icon {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .menu-btn:hover {
            background: linear-gradient(135deg, var(--accent-green), #00b894);
            border-color: var(--accent-green);
            transform: translateY(-4px) scale(1.01);
            box-shadow: 0 20px 40px var(--accent-green-glow);
            color: var(--bg-primary);
        }

        .menu-btn:hover .icon {
            background: rgba(255,255,255,0.2);
        }

        .menu-btn:active {
            transform: translateY(-2px) scale(0.99);
        }

        /* Form Card */
        .form-card {
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            padding: 32px;
            border-radius: 28px;
            border: 1px solid var(--border-color);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.4);
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: fadeScale 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeScale {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .form-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue), var(--accent-purple));
        }

        .form-card h3 {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 24px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 16px 20px;
            border-radius: 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            background: rgba(0, 0, 0, 0.3);
            color: var(--text-primary);
            font-size: 16px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        input::placeholder {
            color: var(--text-muted);
        }

        input:focus, select:focus {
            border-color: var(--accent-green);
            outline: none;
            box-shadow: 0 0 0 4px var(--accent-green-glow);
            background: rgba(0, 0, 0, 0.4);
        }

        .quick-amount {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 14px;
        }

        .quick-amount button {
            padding: 14px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .quick-amount button:hover {
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-color: transparent;
            color: var(--bg-primary);
            transform: translateY(-2px);
        }

        .result-display {
            background: linear-gradient(135deg, rgba(0, 217, 165, 0.1), rgba(59, 130, 246, 0.1));
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            margin-bottom: 24px;
            border: 1px solid var(--border-highlight);
        }

        .result-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 36px;
            font-weight: 900;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .result-detail {
            font-size: 13px;
            color: var(--text-secondary);
            margin-top: 8px;
        }

        .btn-main {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent-green), #00b894);
            color: var(--bg-primary);
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 10px 30px var(--accent-green-glow);
            position: relative;
            overflow: hidden;
        }

        .btn-main::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s;
        }

        .btn-main:hover {
            transform: translateY(-3px);
            box-shadow: 0 20px 50px var(--accent-green-glow);
        }

        .btn-main:hover::before {
            left: 100%;
        }

        .btn-main:active {
            transform: translateY(-1px) scale(0.98);
        }

        /* Promo Section */
        .promo-item {
            background: var(--card-bg);
            padding: 28px;
            border-radius: 24px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
        }

        .promo-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--accent-green), var(--accent-blue));
        }

        .promo-item:hover {
            transform: translateY(-6px);
            border-color: var(--border-highlight);
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.3);
        }

        .promo-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 16px;
        }

        .promo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .promo-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .promo-desc {
            color: var(--text-secondary);
            line-height: 1.7;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .promo-highlight {
            color: var(--accent-green);
            font-weight: 700;
        }

        /* FAQ Section - Accordion Style */
        .faq-section {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .faq-item {
            background: var(--card-bg);
            border-radius: 20px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(20px);
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .faq-item:hover {
            border-color: var(--border-highlight);
        }

        .faq-item.active {
            border-color: var(--accent-green);
            box-shadow: 0 10px 40px var(--accent-green-glow);
        }

        .faq-question {
            padding: 22px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: all 0.3s ease;
            user-select: none;
        }

        .faq-question:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .faq-question-text {
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 600;
            font-size: 15px;
        }

        .faq-number {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-blue));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 14px;
            color: var(--bg-primary);
            flex-shrink: 0;
        }

        .faq-toggle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .faq-toggle svg {
            width: 16px;
            height: 16px;
            stroke: var(--text-secondary);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .faq-item.active .faq-toggle {
            background: var(--accent-green);
        }

        .faq-item.active .faq-toggle svg {
            stroke: var(--bg-primary);
            transform: rotate(180deg);
        }

        .faq-answer {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .faq-item.active .faq-answer {
            max-height: 300px;
        }

        .faq-answer-content {
            padding: 0 24px 24px;
            padding-left: 72px;
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 14px;
        }

        .faq-answer-content strong {
            color: var(--accent-green);
        }

        /* Sticky Bottom */
        .sticky {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 32px);
            max-width: 520px;
            background: rgba(10, 14, 26, 0.95);
            backdrop-filter: blur(30px);
            padding: 14px;
            border-radius: 24px;
            border: 1px solid var(--border-highlight);
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .sticky-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 18px;
            background: linear-gradient(135deg, var(--accent-green), #00b894);
            color: var(--bg-primary);
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .sticky-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 30px var(--accent-green-glow);
        }

        /* Typing Indicator */
        .typing {
            display: none;
            align-items: center;
            gap: 8px;
            margin-left: 58px;
            margin-bottom: 16px;
            font-size: 13px;
            color: var(--text-muted);
        }

        .typing-dots {
            display: flex;
            gap: 4px;
        }

        .typing-dots span {
            width: 6px;
            height: 6px;
            background: var(--accent-green);
            border-radius: 50%;
            animation: bounce 1.4s ease-in-out infinite;
        }

        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-8px); }
        }

        /* Promo Banner */
        .promo-banner {
            background: linear-gradient(135deg, rgba(0, 217, 165, 0.15), rgba(59, 130, 246, 0.15));
            padding: 16px 20px;
            border-radius: 16px;
            margin-bottom: 24px;
            border: 1px dashed var(--border-highlight);
            text-align: center;
            font-size: 14px;
        }

        .promo-banner b {
            color: var(--accent-green);
        }

        /* Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            padding: 12px 20px;
            border-radius: 12px;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-green);
            color: var(--text-primary);
        }

        /* Rate Display */
        .rate-display {
            background: linear-gradient(135deg, rgba(0, 217, 165, 0.1), rgba(59, 130, 246, 0.1));
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border-highlight);
        }

        .rate-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .rate-item:last-child {
            border-bottom: none;
        }

        .rate-provider {
            font-weight: 600;
            color: var(--text-primary);
        }

        .rate-value {
            font-weight: 800;
            color: var(--accent-green);
            font-size: 18px;
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Responsive */
        @media (max-width: 480px) {
            .chat-container {
                padding: 20px 12px 150px;
            }
            .form-card {
                padding: 24px 20px;
            }
            .promo-item {
                padding: 22px 18px;
            }
            .faq-answer-content {
                padding-left: 24px;
            }
            .quick-amount {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

<!-- Animated Background -->
<div class="bg-animation">
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
    <div class="bg-blob"></div>
</div>
<div class="grid-overlay"></div>

<div class="chat-container" id="main-chat">
    
    <div class="header-badge">
        <span class="status-dot"></span>
        Admin Online - Proses Cepat 3-5 Menit
    </div>

    <div id="wrapper1" class="msg-wrapper" style="display: none;">
        <div class="logo-cp">CP</div>
        <div class="bubble bot">
            Selamat datang di <strong style="color: var(--accent-green);">CuanPulsa</strong>!<br>
            Platform tukar pulsa terpercaya dengan rate tertinggi.
        </div>
    </div>

    <div id="wrapper2" class="msg-wrapper" style="display: none;">
        <div class="logo-cp">CP</div>
        <div class="bubble bot">
            <div style="font-weight: 700; margin-bottom: 12px; font-size: 16px;">Rate Hari Ini:</div>
            <div class="rate-display">
                <div class="rate-item">
                    <span class="rate-provider">Telkomsel</span>
                    <span class="rate-value">0.78</span>
                </div>
                <div class="rate-item">
                    <span class="rate-provider">XL / Axis</span>
                    <span class="rate-value">0.77</span>
                </div>
                <div class="rate-item">
                    <span class="rate-provider">Indosat</span>
                    <span class="rate-value">0.75</span>
                </div>
            </div>
        </div>
    </div>

    <div id="wrapper3" class="msg-wrapper" style="display: none;">
        <div class="logo-cp">CP</div>
        <div class="bubble bot">Pilih layanan yang kamu butuhkan:</div>
    </div>

    <div id="area"></div>

    <div id="menu" class="menu-grid">
        <button class="menu-btn" onclick="showForm()">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
                </svg>
            </span>
            <span>Tukar Pulsa Sekarang</span>
        </button>
        <button class="menu-btn" onclick="showPromo()">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M20 12v6a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-6M12 2l3 6H9l3-6zM12 8v14"/>
                </svg>
            </span>
            <span>Promo Member Spesial</span>
        </button>
        <button class="menu-btn" onclick="showFAQ()">
            <span class="icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M9 9a3 3 0 1 1 4 2.83V14M12 17h.01"/>
                </svg>
            </span>
            <span>Tanya Jawab (FAQ)</span>
        </button>
    </div>

    <div class="typing" id="typing">
        <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <span>Admin sedang mengetik...</span>
    </div>
</div>

<div class="sticky">
    <button class="sticky-btn" onclick="showForm()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
        </svg>
        Jual Pulsa Sekarang
    </button>
</div>

<script>
const wa = "628123456789";
let selectedPromo = "";
const menu = document.getElementById('menu');
const area = document.getElementById('area');
const typing = document.getElementById('typing');

// Initialize
window.onload = () => {
    setTimeout(() => showMsg('wrapper1', 500), 800);
    setTimeout(() => showMsg('wrapper2', 500), 2200);
    setTimeout(() => showMsg('wrapper3', 500), 3800);
    
    setTimeout(() => {
        const chatContainer = document.getElementById('main-chat');
        chatContainer.appendChild(menu);
        menu.classList.add('visible');
        scrollToBottom();
    }, 4800);
};

function showMsg(id, delay) {
    const msgEl = document.getElementById(id);
    const chatContainer = document.getElementById('main-chat');
    
    typing.style.display = 'flex';
    msgEl.parentNode.insertBefore(typing, msgEl);
    scrollToBottom();
    
    setTimeout(() => {
        typing.style.display = 'none';
        msgEl.style.display = 'flex';
        chatContainer.appendChild(area);
        scrollToBottom();
    }, delay);
}

function scrollToBottom() {
    window.scrollTo({ top: document.body.scrollHeight + 200, behavior: 'smooth' });
}

// Form Jual Pulsa
function showForm() {
    area.innerHTML = `
    <div class="form-card">
        <h3>Tukar Pulsa</h3>
        
        ${selectedPromo ? `
        <div class="promo-banner">
            Promo Aktif: <b>${selectedPromo}</b>
        </div>` : ''}
        
        <div class="form-group">
            <label>Pilih Provider</label>
            <select id="provider" onchange="calculate()">
                <option value="0.78">Telkomsel - Rate 0.78</option>
                <option value="0.77">XL / Axis - Rate 0.77</option>
                <option value="0.75">Indosat - Rate 0.75</option>
            </select>
        </div>
        
        <div class="form-group">
            <label>Nominal Pulsa</label>
            <div class="quick-amount">
                <button type="button" onclick="setAmount(25000)">25K</button>
                <button type="button" onclick="setAmount(50000)">50K</button>
                <button type="button" onclick="setAmount(100000)">100K</button>
            </div>
            <input type="number" id="amount" placeholder="Masukkan nominal lain..." oninput="calculate()">
        </div>
        
        <div class="result-display">
            <div class="result-label">Estimasi Yang Anda Terima</div>
            <div class="result-value" id="result">Rp 0</div>
            <div class="result-detail" id="detail">Minimal transaksi Rp 10.000</div>
        </div>
        
        <div class="form-group">
            <label>Tujuan Pembayaran</label>
            <input type="text" id="destination" placeholder="No. Dana / OVO / Bank">
        </div>
        
        <button class="btn-main" onclick="sendTransaction()">
            Lanjutkan ke WhatsApp
        </button>
        
        <button class="back-btn" onclick="resetChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Kembali ke Menu
        </button>
    </div>`;
    scrollToBottom();
}

function setAmount(val) {
    document.getElementById('amount').value = val;
    calculate();
}

function calculate() {
    const provider = document.getElementById('provider');
    const amount = document.getElementById('amount');
    const result = document.getElementById('result');
    const detail = document.getElementById('detail');
    
    const rate = parseFloat(provider.value);
    const nominal = parseInt(amount.value) || 0;
    
    if (nominal >= 10000) {
        const total = Math.floor(nominal * rate);
        result.textContent = `Rp ${total.toLocaleString('id-ID')}`;
        detail.textContent = `Rate: ${rate} | Nominal: Rp ${nominal.toLocaleString('id-ID')}`;
    } else {
        result.textContent = 'Rp 0';
        detail.textContent = 'Minimal transaksi Rp 10.000';
    }
}

function sendTransaction() {
    const amount = document.getElementById('amount').value;
    const destination = document.getElementById('destination').value;
    const provider = document.getElementById('provider');
    const providerName = provider.options[provider.selectedIndex].text.split(' - ')[0];
    
    if (!amount || !destination) {
        alert('Mohon lengkapi semua data terlebih dahulu!');
        return;
    }
    
    let message = `Halo Admin CuanPulsa!\n\nSaya mau tukar pulsa:\n• Provider: ${providerName}\n• Nominal: Rp ${parseInt(amount).toLocaleString('id-ID')}\n• Tujuan: ${destination}`;
    
    if (selectedPromo) {
        message += `\n• Promo: ${selectedPromo}`;
    }
    
    window.open(`https://wa.me/${wa}?text=${encodeURIComponent(message)}`);
}

// Promo Section
function showPromo() {
    area.innerHTML = `
    <div class="msg-wrapper" style="display: flex; opacity: 1; transform: none;">
        <div class="logo-cp">CP</div>
        <div class="bubble bot" style="max-width: 100%;">
            <div style="font-size: 20px; font-weight: 800; background: linear-gradient(135deg, var(--accent-green), var(--accent-blue)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 8px;">
                Promo Spesial Hari Ini
            </div>
            Pilih promo yang ingin kamu klaim:
        </div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 16px; margin-top: 8px;">
        <div class="promo-item">
            <div class="promo-header">
                <div class="promo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" stroke-width="2">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <div class="promo-title">Promo Hari Ini</div>
            </div>
            <div class="promo-desc">
                <span class="promo-highlight">Jumat Berkah:</span> Rate Telkomsel naik jadi <strong style="color: var(--accent-green);">0.80</strong>!<br>
                <span class="promo-highlight">Jam Malam:</span> Transaksi jam 21:00-22:00 bebas biaya admin.
            </div>
            <button class="btn-main" onclick="showForm()" style="padding: 14px;">
                Klaim Promo Ini
            </button>
        </div>
        
        <div class="promo-item">
            <div class="promo-header">
                <div class="promo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" stroke-width="2">
                        <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="8.5" cy="7" r="4"/>
                        <line x1="20" y1="8" x2="20" y2="14"/>
                        <line x1="23" y1="11" x2="17" y2="11"/>
                    </svg>
                </div>
                <div class="promo-title">Bonus New Member</div>
            </div>
            <div class="promo-desc">
                Transaksi pertama di CuanPulsa? Dapatkan <span class="promo-highlight">Bonus Rp 2.000</span> langsung cair ke rekeningmu!
            </div>
            <button class="btn-main" onclick="selectPromo('NEWUSER', 'Bonus New Member Rp 2.000')" style="padding: 14px;">
                Klaim Bonus
            </button>
        </div>
        
        <div class="promo-item">
            <div class="promo-header">
                <div class="promo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#0a0e1a" stroke-width="2">
                        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
                    </svg>
                </div>
                <div class="promo-title">Program CuanPoin</div>
            </div>
            <div class="promo-desc">
                Kumpulkan poin setiap transaksi!<br>
                <span class="promo-highlight">Tukar 100K = 1 Poin</span><br>
                <span class="promo-highlight">1 Poin = Rp 1.000</span><br>
                Cairkan kapan saja ke e-wallet favoritmu.
            </div>
            <button class="btn-main" onclick="sendWA('DAFTAR POIN')" style="padding: 14px;">
                Daftar Sekarang
            </button>
        </div>
    </div>
    
    <button class="back-btn" onclick="resetChat()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Kembali ke Menu
    </button>`;
    scrollToBottom();
}

function selectPromo(code, desc) {
    selectedPromo = `${code} - ${desc}`;
    showForm();
}

function sendWA(message) {
    window.open(`https://wa.me/${wa}?text=${encodeURIComponent(`Halo Admin! Saya mau ${message}`)}`);
}

// FAQ Section - Accordion
function showFAQ() {
    area.innerHTML = `
    <div class="msg-wrapper" style="display: flex; opacity: 1; transform: none;">
        <div class="logo-cp">CP</div>
        <div class="bubble bot" style="max-width: 100%;">
            <div style="font-size: 18px; font-weight: 700; margin-bottom: 4px; color: var(--accent-green);">
                Pertanyaan yang Sering Diajukan
            </div>
            Klik pertanyaan untuk melihat jawaban.
        </div>
    </div>
    
    <div class="faq-section" style="margin-top: 16px;">
        <div class="faq-item" onclick="toggleFAQ(this)">
            <div class="faq-question">
                <div class="faq-question-text">
                    <span class="faq-number">1</span>
                    <span>Apakah transaksi di CuanPulsa aman?</span>
                </div>
                <div class="faq-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>
            <div class="faq-answer">
                <div class="faq-answer-content">
                    <strong>100% Aman!</strong> CuanPulsa sudah dipercaya oleh ribuan member sejak 2020. Semua transaksi diproses secara transparan dengan bukti transfer real-time. Kami juga menyediakan bukti transfer untuk setiap transaksi yang berhasil.
                </div>
            </div>
        </div>
        
        <div class="faq-item" onclick="toggleFAQ(this)">
            <div class="faq-question">
                <div class="faq-question-text">
                    <span class="faq-number">2</span>
                    <span>Berapa lama proses pencairan?</span>
                </div>
                <div class="faq-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>
            <div class="faq-answer">
                <div class="faq-answer-content">
                    Proses pencairan sangat cepat! <strong>Rata-rata hanya 3-5 menit</strong> setelah pulsa kami terima. Untuk transaksi di atas jam kerja (malam hari), maksimal proses 1x24 jam.
                </div>
            </div>
        </div>
        
        <div class="faq-item" onclick="toggleFAQ(this)">
            <div class="faq-question">
                <div class="faq-question-text">
                    <span class="faq-number">3</span>
                    <span>Apakah ada biaya admin?</span>
                </div>
                <div class="faq-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>
            <div class="faq-answer">
                <div class="faq-answer-content">
                    <strong>Gratis untuk E-Wallet!</strong> Transfer ke DANA, OVO, dan GoPay tidak dipungut biaya admin. Untuk transfer bank, berlaku biaya admin sesuai ketentuan (Rp 2.500 - Rp 6.500 tergantung bank tujuan).
                </div>
            </div>
        </div>
        
        <div class="faq-item" onclick="toggleFAQ(this)">
            <div class="faq-question">
                <div class="faq-question-text">
                    <span class="faq-number">4</span>
                    <span>Minimal dan maksimal transaksi?</span>
                </div>
                <div class="faq-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>
            <div class="faq-answer">
                <div class="faq-answer-content">
                    <strong>Minimal transaksi: Rp 10.000</strong><br>
                    <strong>Maksimal per transaksi: Rp 2.000.000</strong><br>
                    Untuk transaksi di atas 2 juta, silakan hubungi admin untuk penanganan khusus dan rate lebih tinggi.
                </div>
            </div>
        </div>
        
        <div class="faq-item" onclick="toggleFAQ(this)">
            <div class="faq-question">
                <div class="faq-question-text">
                    <span class="faq-number">5</span>
                    <span>Bagaimana cara kerja CuanPoin?</span>
                </div>
                <div class="faq-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>
            <div class="faq-answer">
                <div class="faq-answer-content">
                    <strong>Sistem poin sangat simpel!</strong><br>
                    1. Setiap tukar Rp 100.000 = dapat 1 Poin<br>
                    2. Kumpulkan poin sebanyak-banyaknya<br>
                    3. Tukar poin kapan saja: 1 Poin = Rp 1.000<br>
                    4. Cairkan langsung ke e-wallet favoritmu!<br><br>
                    Daftar gratis di menu Promo Member.
                </div>
            </div>
        </div>
        
        <div class="faq-item" onclick="toggleFAQ(this)">
            <div class="faq-question">
                <div class="faq-question-text">
                    <span class="faq-number">6</span>
                    <span>Provider apa saja yang diterima?</span>
                </div>
                <div class="faq-toggle">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </div>
            </div>
            <div class="faq-answer">
                <div class="faq-answer-content">
                    Kami menerima semua provider mayoritas di Indonesia:<br>
                    <strong>Telkomsel</strong> (Rate: 0.78)<br>
                    <strong>XL & Axis</strong> (Rate: 0.77)<br>
                    <strong>Indosat</strong> (Rate: 0.75)<br><br>
                    Untuk provider lain (Tri, Smartfren), silakan tanya admin langsung.
                </div>
            </div>
        </div>
    </div>
    
    <div style="display: flex; flex-direction: column; gap: 12px; margin-top: 24px;">
        <button class="btn-main" onclick="showForm()">
            Mulai Tukar Pulsa
        </button>
        <button class="back-btn" onclick="resetChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
            Kembali ke Menu
        </button>
    </div>`;
    scrollToBottom();
}

function toggleFAQ(element) {
    const allItems = document.querySelectorAll('.faq-item');
    const isActive = element.classList.contains('active');
    
    // Close all
    allItems.forEach(item => item.classList.remove('active'));
    
    // Open clicked if wasn't active
    if (!isActive) {
        element.classList.add('active');
    }
}

function resetChat() {
    area.innerHTML = '';
    selectedPromo = '';
    menu.classList.add('visible');
    document.getElementById('main-chat').appendChild(menu);
    scrollToBottom();
}
</script>

</body>
  </html>
